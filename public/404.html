<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>404 · SousChef</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; margin: 0; }
      body {
        font-family: system-ui, sans-serif;
        background: radial-gradient(900px 600px at 80% 0%, rgba(155,123,255,.18), transparent 55%),
          radial-gradient(900px 700px at 10% 100%, rgba(255,77,141,.16), transparent 55%), #0f0d15;
        color: #f4f1f7;
        min-height: 100vh;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 24px;
      }
      .code {
        font-size: clamp(4rem, 16vw, 8rem);
        font-weight: 800;
        line-height: 1;
        background: linear-gradient(120deg, #ff8a5c, #ff4d8d);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      h1 { font-size: 1.6rem; margin: 8px 0 12px; }
      p { color: #b6afc4; max-width: 420px; margin: 0 auto 24px; }
      a {
        display: inline-block;
        text-decoration: none;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(120deg, #ff8a5c, #ff4d8d);
        padding: 14px 26px;
        border-radius: 14px;
        box-shadow: 0 14px 34px -12px #ff4d8d;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="code">404</div>
      <h1>🍽️ This dish isn't on the menu.</h1>
      <p>The page you were looking for doesn't exist or has moved.</p>
      <a href="/">🍳 Back to the kitchen</a>
    </main>
  </body>
</html>
